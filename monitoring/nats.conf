# NATS server configuration for the optimus self-host stack.
#
# JetStream is required (bounded streams + pull consumers). The HTTP monitoring
# port (8222) backs the compose healthcheck (/healthz reports JetStream
# readiness). max_payload is raised well above the NATS 1 MiB default because
# images ride inline as base64 in image_fetched events: a raw image up to
# OPTIMUS_INGEST_MAX_INLINE_BYTES (default 8 MiB) inflates ~4/3 plus a JSON
# envelope, so the server must accept ~11 MiB. 12 MiB leaves headroom. The
# ingest service validates the configured inline cap against this negotiated
# limit at startup and fails fast if it is too small, so a mismatch can never
# silently drop images.
#
# Set here in a config file rather than on the command line: nats-server only
# accepts max_payload via configuration, not as a CLI flag — passing
# `--max_payload` crashes the server with "flag provided but not defined".
jetstream {
  store_dir: /data
  # Pin the file-store ceiling instead of letting JetStream auto-size it from
  # whatever free disk happens to be on the host. The OPTIMUS_EVENTS stream is
  # bounded at 1 GiB (bus.nats DEFAULT_MAX_BYTES); a 2 GiB store leaves headroom
  # for that plus consumer/dedup state, and makes `add_stream` deterministic
  # rather than failing with "insufficient storage resources" on a full disk.
  max_file_store: 2147483648
}

http_port: 8222

max_payload: 12582912
